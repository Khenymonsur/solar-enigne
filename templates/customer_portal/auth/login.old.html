{% extends "layouts/customer_base.html" %}

{% block customer_content %}

<div class="container py-5">

    <div class="customer-card mx-auto"
         style="max-width:500px;">

        <div class="card-body p-4">

            <h2 class="mb-4">
                Welcome Back
            </h2>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    class="btn btn-success w-100">

                    Sign In

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
