<div class="customer-card sticky-top">

    <div class="card-body">

        <h5 class="fw-bold mb-3">

            <i class="bi bi-info-circle-fill text-success"></i>

            {{ title }}

        </h5>

        <p class="text-muted">

            {{ body }}

        </p>

        {% if tip %}

            <div class="alert alert-success mt-4 mb-0">

                <strong>

                    Tip

                </strong>

                <br>

                {{ tip }}

            </div>

        {% endif %}

    </div>

</div>
