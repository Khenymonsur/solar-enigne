<div class="d-flex justify-content-between align-items-center mt-5">

    {% if back_url %}

        <a
            href="{{ back_url }}"
            class="btn btn-outline-secondary px-4">

            <i class="bi bi-arrow-left"></i>

            Back

        </a>

    {% else %}

        <div></div>

    {% endif %}

    <button
        type="submit"
        class="btn btn-success btn-lg px-5">

        {{ next_text }}

        <i class="bi bi-arrow-right"></i>

    </button>

</div>
