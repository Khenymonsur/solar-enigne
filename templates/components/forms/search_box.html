<div class="card mb-4">

    <div class="card-body">

        <form method="get">

            <div class="row">

                <div class="col-md-10">

                    <input
                        type="text"
                        name="q"
                        class="form-control"

                        placeholder="Search customer..."

                        value="{{ request.GET.q }}">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-success w-100">

                        <i class="bi bi-search"></i>

                        Search

                    </button>

                </div>

            </div>

        </form>

    </div>

</div>
