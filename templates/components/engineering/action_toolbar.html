            <a
                href="{% url 'audits:update' object.pk %}"
                class="btn btn-warning">

                <i class="bi bi-pencil-square"></i>

                Edit Assessment

            </a>

            <a
                href="{% url 'audits:add_appliance' object.pk %}"
                class="btn btn-success">

                <i class="bi bi-plus-circle"></i>

            </a>
