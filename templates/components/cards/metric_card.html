<div class="col-xl-3 col-lg-6 col-md-6 mb-4">

    <div class="metric-card">

        <div class="metric-icon">

            <i class="bi {{ icon }}"></i>

        </div>

        <div class="metric-content">

            <h6>

                {{ title }}

            </h6>

            <h3>

                {{ value }}

            </h3>

            {% if footer %}

                <small>

                    {{ footer }}

                </small>

            {% endif %}

        </div>

    </div>

</div>
