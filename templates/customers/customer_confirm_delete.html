{% extends "layouts/base.html" %}

{% block content %}

<div class="card">

    <div class="card-body">

        <h3>

            Delete Customer?

        </h3>

        <p>

            {{ object.full_name }}

        </p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">

                Delete

            </button>

            <a href="{% url 'customers:list' %}"
               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
