{% extends "layouts/base.html" %}

{% block title %}Delete Appliance{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">

    <div class="card-body text-center py-5">

        <i class="bi bi-trash display-3 text-danger"></i>

        <h3 class="mt-3">

            Delete Appliance

        </h3>

        <p class="text-muted">

            Are you sure you want to permanently delete

            <strong>

            {{ object.quantity }} × {{ object.library_appliance.name }}

            </strong>?

        </p>

        <form method="post">

            {% csrf_token %}

            <button class="btn btn-danger">

                <i class="bi bi-trash"></i>

                Delete

            </button>

            <a href="{% url 'equipment:appliance-list' %}"

               class="btn btn-secondary">

                Cancel

            </a>

        </form>

    </div>

</div>

{% endblock %}
