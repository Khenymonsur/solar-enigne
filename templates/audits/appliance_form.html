{% extends "base.html" %}

{% block title %}
Add Appliance
{% endblock %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-success text-white">

        <h3>Add Appliance</h3>

    </div>

    <div class="card-body">

        <h5>

            {{ assessment.project_name }}

        </h5>

        <hr>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-success">

                Save Appliance

            </button>

        </form>

    </div>

</div>

{% endblock %}
